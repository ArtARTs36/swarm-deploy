# Git repository settings for stack manifests.
git:
  # Repository URL (ssh/https).
  repository: git@github.com:your-org/your-stacks-repo.git
  # Branch to synchronize.
  branch: main
  # Git authentication settings.
  auth:
    # Authentication type: none | http | ssh.
    type: ssh
    # SSH authentication settings.
    ssh:
      # SSH username.
      user: git
      # Path to private SSH key.
      privateKeyPath: /run/secrets/deploy_key
      # Path to known_hosts file (optional).
      knownHostsPath: /etc/ssh/ssh_known_hosts

# Git-to-deploy synchronization settings.
sync:
  # Synchronization mode: pull | webhook | hybrid.
  mode: hybrid
  # Pull polling interval.
  pollInterval: 30s
  # Webhook synchronization trigger settings.
  webhook:
    # Enable HTTP webhook endpoint.
    enabled: true
    # Webhook HTTP server listen address.
    address: ":8083"
    # Webhook endpoint HTTP path.
    path: /api/v1/webhooks/git
    # Path to file with webhook secret.
    secretPath: /run/secrets/webhook_secret

# Path to stacks definition file.
stacksFile: ./stacks.yaml

# Secret/config name rotation settings.
secretRotation:
  # Enable rotation.
  enabled: true
  # Hash suffix length.
  hashLength: 10
  # Include source file path in hash.
  includePath: true

# Deployment notification channels.
notifications:
  # Telegram channels.
  telegram:
    # Single Telegram channel.
    - name: ops
      # Path to file with bot token.
      botTokenPath: /run/secrets/telegram_bot_token
      # Chat/channel ID.
      chatId: "-1000000000000"
      # Thread (topic) ID inside chat.
      chatThreadId: 42
      # Message text template.
      message: |
        deploy {{.status}}
        stack_name: {{.stack_name}}
        service: {{.service}}
        image.full_name: {{.image.full_name}}
        image.version: {{.image.version}}
  # Custom webhook channels.
  custom:
    # Single webhook channel.
    - name: audit
      # External webhook URL.
      url: https://hooks.example.com/swarm-deploy
      # HTTP method for webhook request.
      method: POST

# UI and API web server addresses.
web:
  # API server listen address.
  apiAddress: ":8080"
  # Frontend server listen address.
  frontendAddress: ":8082"

# Dedicated health/metrics server.
healthServer:
  # Health/metrics server listen address.
  address: ":8081"
  # Metrics endpoint settings.
  metrics:
    # Prometheus metrics HTTP path.
    path: /metrics
  # Health endpoint settings.
  healthz:
    # Health-check HTTP path.
    path: /healthz

# Docker stack deploy execution settings.
swarm:
  # Docker CLI command.
  command: docker
  # Stack deploy command arguments.
  stackDeployArgs:
    - stack
    - deploy
    - --with-registry-auth
    - --prune
  # Init job polling interval.
  initJobPollEvery: 2s
  # Maximum init job duration.
  initJobMaxDuration: 10m
